name: ArtNet Scraper

on:
  schedule:
    - cron: '0 6 * * *'   # 6am UTC  (3am BA / 7am España / 2pm Tokyo)
    - cron: '0 13 * * *'  # 1pm UTC (10am BA / 2pm España / 10pm Tokyo)
    - cron: '0 20 * * *'  # 8pm UTC  (5pm BA / 9pm España / 5am Tokyo+1)
  workflow_dispatch:       # Manual trigger desde GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install scraper dependencies
        run: cd scraper && npm ci

      - name: Run scraper (web + Google Search)
        run: cd scraper && node index.js --once --no-telegram
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
          SERPER_KEY: ${{ secrets.SERPER_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
