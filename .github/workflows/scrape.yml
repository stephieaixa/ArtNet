name: ArtNet Scraper

on:
  schedule:
    - cron: '0 9 * * *'   # 9am UTC (6am Buenos Aires / 11am Madrid)
    - cron: '0 21 * * *'  # 9pm UTC (6pm Buenos Aires / 11pm Madrid)
  workflow_dispatch:       # Manual trigger desde GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install scraper dependencies
        run: cd scraper && npm ci

      - name: Run scraper (web + Google Search)
        run: cd scraper && node index.js --once --no-telegram
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
          SERPER_KEY: ${{ secrets.SERPER_KEY }}
          # Opcional: mantener Gemini como fallback de extracción
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
